name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Execute remote SSH commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ec2-13-233-154-58.ap-south-1.compute.amazonaws.com
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd BMS
            git pull origin main
            pnpm install
            NODE_OPTIONS=--max-old-space-size=400 pnpm run build
            pm2 restart fe-server || echo "fe-server not found, please start it"
            pm2 restart http-server || echo "http-server not found, please start it manually"
            pm2 restart ws-server || echo "ws-server not found, please start it manually"
            pm2 save
